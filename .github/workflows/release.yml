name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' printapi/__init__.py)" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build source tarball
        if: steps.existing.outputs.exists == 'false'
        run: |
          git archive --format=tar.gz --prefix="epson-rp-api-${{ steps.version.outputs.version }}/" \
            -o "epson-rp-api-${{ steps.version.outputs.version }}.tar.gz" HEAD

      - name: Create release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "epson-rp-api-${{ steps.version.outputs.version }}.tar.gz" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
